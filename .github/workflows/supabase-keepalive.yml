name: Supabase Keep Alive
on:
  schedule:
   - cron: "0 0 */5 * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/${{ secrets.SUPABASE_TABLE }}" \
          -H "apikey: ${{ secrets.SUPABASE_API_KEY }}"
